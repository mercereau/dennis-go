services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PI_IP:?set PI_IP to your Pi LAN IP}:53:53/udp"
      - "${PI_IP}:53:53/tcp"
      - "9090:9090"
    volumes:
      - dns-data:/data
    # Required to bind to port 53 on the host
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dns-data:
